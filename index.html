<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Stop Watch</title>

    <link href="./styles/index.css" rel="stylesheet"/>
    <link href="./styles/stopWatch.css" rel="stylesheet"/>
    <link href="./styles/buttons.css" rel="stylesheet"/>
  </head>
  <body>
    <div class="stopWatch">
      <h1 id="displayTime">00:00:00</h1>
      <div class="buttons">
        <img id="stopButton" src="./images/stop.png" alt="stop Icon"/>
        <img id="startButton" src="./images/start.png" alt="start Icon"/>
        <img id="resetButton" src="./images/reset.png" alt="reset Icon"/>
      </div>
    </div>

    <script src="./scripts/index.js"></script>
  </body>
</html>
